[advisories]
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "Unicode-3.0",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
skip = [
    # tree-wide transitive duplicates we can't resolve
    { crate = "core-foundation", reason = "transitive via reqwest (native-tls vs macOS)" },
    { crate = "getrandom", reason = "transitive via rand 0.8 vs tempfile" },
    { crate = "syn", reason = "syn 2.x and 3.x both transitive deps" },
]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
