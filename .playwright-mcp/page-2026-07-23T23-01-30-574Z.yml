                - article [ref=f16e413]:
                  - generic [ref=f16e414]:
                    - heading "Satoxcoin Seeder" [level=1] [ref=f16e415]
                    - 'link "Permalink: Satoxcoin Seeder" [ref=f16e416] [cursor=pointer]':
                      - /url: "#satoxcoin-seeder"
                  - paragraph [ref=f16e419]: DNS seed crawler for the Satoxcoin network. Discovers and monitors active Satoxcoin nodes, then serves them via a built-in DNS server. Written in Rust.
                  - paragraph [ref=f16e420]:
                    - text: This is a port of the
                    - link "bitcoin-seeder" [ref=f16e421] [cursor=pointer]:
                      - /url: https://github.com/sipa/bitcoin-seeder
                    - text: approach, adapted for Satoxcoin parameters (KawPoW, port 60777).
                  - generic [ref=f16e422]:
                    - heading "Features" [level=2] [ref=f16e423]
                    - 'link "Permalink: Features" [ref=f16e424] [cursor=pointer]':
                      - /url: "#features"
                  - list [ref=f16e427]:
                    - listitem [ref=f16e428]:
                      - strong [ref=f16e429]: P2P crawler
                      - text: — connects to discovered nodes, validates protocol version, checks chain height and sync status
                    - listitem [ref=f16e430]:
                      - strong [ref=f16e431]: Exponential-decay scoring
                      - text: — rates nodes by reliability, not just uptime
                    - listitem [ref=f16e432]:
                      - strong [ref=f16e433]: Embedded DNS server
                      - text: — serves A/AAAA/SOA/NS records directly (raw UDP, no libunbound dependency)
                    - listitem [ref=f16e434]:
                      - strong [ref=f16e435]: Ban/ignore system
                      - text: — filters misbehaving or low-version nodes
                    - listitem [ref=f16e436]:
                      - strong [ref=f16e437]: Cloudflare DNS publish
                      - text: — pushes seed results to Cloudflare DNS as A records (
                      - code [ref=f16e438]: dnsseed-publish
                      - text: binary)
                    - listitem [ref=f16e439]:
                      - strong [ref=f16e440]: Live stats
                      - text: — periodic stats logging via tracing
                    - listitem [ref=f16e441]:
                      - strong [ref=f16e442]: Block height monitoring
                      - text: — fetches latest block height from explorer API to reject out-of-sync nodes
                  - generic [ref=f16e443]:
                    - heading "Project Structure" [level=2] [ref=f16e444]
                    - 'link "Permalink: Project Structure" [ref=f16e445] [cursor=pointer]':
                      - /url: "#project-structure"
                  - generic [ref=f16e448]:
