            - article [ref=e337]:
              - generic [ref=e338]:
                - heading "Satoxcoin Seeder" [level=1] [ref=e339]
                - 'link "Permalink: Satoxcoin Seeder" [ref=e340] [cursor=pointer]':
                  - /url: "#satoxcoin-seeder"
              - paragraph [ref=e343]: DNS seed crawler for the Satoxcoin network. Discovers and monitors active Satoxcoin nodes, then serves them via a built-in DNS server. Written in Rust.
              - paragraph [ref=e344]:
                - text: This is a port of the
                - link "bitcoin-seeder" [ref=e345] [cursor=pointer]:
                  - /url: https://github.com/sipa/bitcoin-seeder
                - text: approach, adapted for Satoxcoin parameters (KawPoW, port 60777).
              - generic [ref=e346]:
                - heading "Features" [level=2] [ref=e347]
                - 'link "Permalink: Features" [ref=e348] [cursor=pointer]':
                  - /url: "#features"
              - list [ref=e351]:
                - listitem [ref=e352]:
                  - strong [ref=e353]: P2P crawler
                  - text: — connects to discovered nodes, validates protocol version, checks chain height and sync status
                - listitem [ref=e354]:
                  - strong [ref=e355]: Exponential-decay scoring
                  - text: — rates nodes by reliability, not just uptime
                - listitem [ref=e356]:
                  - strong [ref=e357]: Embedded DNS server
                  - text: — serves A/AAAA/SOA/NS records directly (raw UDP, no libunbound dependency)
                - listitem [ref=e358]:
                  - strong [ref=e359]: Ban/ignore system
                  - text: — filters misbehaving or low-version nodes
                - listitem [ref=e360]:
                  - strong [ref=e361]: Cloudflare DNS publish
                  - text: — pushes seed results to Cloudflare DNS as A records (
                  - code [ref=e362]: dnsseed-publish
                  - text: binary)
                - listitem [ref=e363]:
                  - strong [ref=e364]: Live stats
                  - text: — periodic stats logging via tracing
                - listitem [ref=e365]:
                  - strong [ref=e366]: Block height monitoring
                  - text: — fetches latest block height from explorer API to reject out-of-sync nodes
              - generic [ref=e367]:
                - heading "Project Structure" [level=2] [ref=e368]
                - 'link "Permalink: Project Structure" [ref=e369] [cursor=pointer]':
                  - /url: "#project-structure"
